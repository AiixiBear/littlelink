    <script>
      fetch('/cdn-cgi/trace')
        .then(res => res.text())
        .then(text => {
          const info = {};
          text.split('\n').forEach(line => {
            const [key, val] = line.split('=');
            if (key) info[key] = val; 
          });
          const colo = info.colo || '未知';
          document.getElementById('trace-info').textContent = `${colo}`;
        })
        .catch(err => {
          console.error('無法抓取 Cloudflare trace', err);
          document.getElementById('trace-info').textContent = '錯誤';
        });
    </script>
